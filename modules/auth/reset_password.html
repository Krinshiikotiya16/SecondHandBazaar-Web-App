<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password</title>

<style>
:root {
            --primary-plum: #BC8F8F; 
            --light-plum: #DEB887;
            --dark-bg: #BC8F8F;
    }
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background-color: var(--dark-bg);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #BC8F8F;
}

.container {
    width: 900px;
    height: 520px;
    display: flex;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* LEFT */
.left {
    width: 50%;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 40px;
    animation: slideInLeft 0.8s ease;
}
.overlay-shapes {
    position: absolute;
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%;
    /* This creates the transparent grid/diagonal effect */
    background: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%) -50px 0,
                linear-gradient(-45deg, rgba(255,255,255,0.1) 25%, transparent 25%) -50px 0;
    background-size: 100px 100px;
    z-index: 0; /* Sits behind the text but on the blue background */
    opacity: 0.3;
    pointer-events: none; /* Makes sure it doesn't block button clicks */
}
.left h1 {
    margin-bottom: 10px;
}

.input-box {
    width: 100%;
    margin: 10px 0;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border: none;
    background: #f1f1f1;
    border-radius: 5px;
}

.btn {
    margin-top: 15px;
    padding: 12px 30px;
    background: #BC8F8F;
    border: none;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn:hover {
    background: #9c6a6a;
    transform: translateY(-2px);
}

#bk{
    background-color: transparent; 
    border-color: #FFFFFF;   
    transition: all 0.3s ease;
    border-radius: 20px; border: 1px solid white;
}

#bk:hover{
    background-color: #fff;
    color: var(--primary-plum);
    transform: translateY(-2px);

}

/* RIGHT */
.right {
    width: 50%;
    background: linear-gradient(135deg, var(--light-plum) 0%, var(--primary-plum) 100%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 40px;
}

/* Animations */
@keyframes slideInLeft {
    from {transform: translateX(-100%); opacity: 0;}
    to {transform: translateX(0); opacity: 1;}
}

@media (max-width:768px){

    .container{
        width:95%;
        height:auto;
        flex-direction:column;
    }

    .left{
        width:100%;
        padding:30px 20px;
    }

    .right{
        display:none;
    }

    .left h1{
        font-size:32px;
        margin-bottom:20px;
    }

    .input-box{
        width:100%;
    }

    .input-box input{
        padding:14px;
        font-size:16px;
    }

    .btn{
        width:100%;
    }
}
    /* Hide on desktop */
#mobileBackBtn{
    display:none !important;
}

/* Show only on mobile */
@media (max-width:768px){

    #mobileBackBtn{
        display:block !important;
        width:100%;
        margin-top:10px;
        padding:12px;
        border-radius:20px;
        border:none;
        background:#BC8F8F;
        color:white;
        cursor:pointer;
    }


}
</style>
</head>

<body>

<div class="container">
    <div class="overlay-shapes"></div> 

<!-- LEFT -->
<div class="left">
    <h1>Reset Password</h1>
    <p>Enter your details</p>

    <form action="forget_password.php" method="POST" onsubmit="return validateForm()">

        <div class="input-box">
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <input type="password" name="newpass" placeholder="New Password" required>
        </div>

        <div class="input-box">
            <input type="password" name="confpass" placeholder="Confirm Password" required>
        </div>

        <button class="btn">Reset Password</button>
        <button type="button" id="mobileBackBtn" onclick="window.location.href='../../index.php'">
    Back to Login
</button>
    </form>
</div>

<!-- RIGHT -->
<div class="right">
    <h2 style="margin-right: 160px; font-family: Comic Sans MS, cursive;">Hello, Guys!</h2>
    <img src="../../assests/img/forgot.png" height="350px" width="300px">
    <p style="font-family: Comic Sans MS, cursive;">Enter new password and regain access</p>

    <button class="btn" onclick="goLogin()" id="bk">Back to Login</button>
</div>

</div>

<script>
function validateForm() {
    let p1 = document.getElementsByName("newpass")[0].value;
    let p2 = document.getElementsByName("confpass")[0].value;

    if (p1 !== p2) {
        alert("Passwords do not match!");
        return false;
    }
    return true;
}

function goLogin() {
    window.location.href = "../../index.php";
}
</script>

</body>
</html>
