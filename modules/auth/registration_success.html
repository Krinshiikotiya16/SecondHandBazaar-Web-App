<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success page</title>

<style>
:root {
    --primary-plum: #BC8F8F;
    --light-plum: #DEB887;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--primary-plum), var(--light-plum));
    overflow: hidden;
}

/* ===== FLOATING SPARKLES ===== */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: floatSparkle 4s linear infinite;
}

@keyframes floatSparkle {
    0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
    }
    50% {
        opacity: 1;
    }
    100% {
        transform: translateY(-120px) scale(1.2);
        opacity: 0;
    }
}

/* ===== CARD ===== */
.card {
    width: 450px;
    background: #fff;
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    z-index: 2;
    position: relative;
}

/* EMOJI */
.emoji {
    font-size: 70px;
    display: inline-block;
    animation: pop 0.6s ease;
}

@keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

h1 {
    margin: 10px 0;
}

p {
    color: #666;
    font-size: 14px;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    background: var(--primary-plum);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #a06c6c;
    transform: scale(1.05);
}

/* ===== CONFETTI ===== */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    opacity: 0.8;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* ===== CARD POP-UP ANIMATION ===== */
.card {
    animation: cardPop 0.6s ease;
}

@keyframes cardPop {
    0% {
        transform: scale(0.5) translateY(40px);
        opacity: 0;
    }
    70% {
        transform: scale(1.05) translateY(-5px);
        opacity: 1;
    }
    100% {
        transform: scale(1) translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">
    <!-- <div class="emoji" id="emoji">😊</div> -->
    <img src="../../assests/img/avo.png" height="200px" width="200px">
        <h1>Registration Successful</h1>
    <p>Your account has been created successfully. Welcome aboard!</p>

    <button onclick="goHome()">Go to Home</button>
</div>

<script>
/* ===== CHANGE EMOJI ===== */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("emoji").innerHTML = "😄";
    }, 500);

    createConfetti();
    createSparkles();
};

/* ===== CONFETTI ===== */
function createConfetti() {
    for (let i = 0; i < 40; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.background = randomColor();
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(() => {
            confetti.remove();
        }, 5000);
    }
}

function randomColor() {
    const colors = ["#fff", "#FFD700", "#BC8F8F", "#FF69B4", "#87CEFA"];
    return colors[Math.floor(Math.random() * colors.length)];
}

/* ===== SPARKLES ===== */
function createSparkles() {
    for (let i = 0; i < 25; i++) {
        let sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");

        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.top = (Math.random() * 100 + 50) + "vh";
        sparkle.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(sparkle);

        setTimeout(() => {
            sparkle.remove();
        }, 6000);
    }
}

/* ===== HOME ===== */
function goHome() {
    window.location.href = "../../index.php";
}
</script>

</body>
</html>
